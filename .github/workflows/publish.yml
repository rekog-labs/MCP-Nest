name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for OIDC trusted publishing

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Update package versions
        run: |
          TAG_VERSION=${{ github.event.release.tag_name }}
          # Remove 'v' prefix if present
          TAG_VERSION=${TAG_VERSION#v}
          # Bump both published workspace packages to the release version.
          # (auth declares @rekog/mcp-nest as a peer with a >= range, so the
          # core bump does not require touching the auth peer range.)
          npm version "$TAG_VERSION" --no-git-tag-version \
            -w @rekog/mcp-nest \
            -w @rekog/mcp-nest-auth

      - name: Publish to npm
        run: |
          TAG_VERSION=${{ github.event.release.tag_name }}
          TAG_VERSION=${TAG_VERSION#v}

          # Check if this is a pre-release version
          if [[ "$TAG_VERSION" =~ (alpha|beta|rc|next|canary) ]]; then
            NPM_TAG=next
          else
            NPM_TAG=latest
          fi
          echo "Publishing @rekog/mcp-nest and @rekog/mcp-nest-auth with --tag $NPM_TAG"

          # Publish core first, then the auth package (which peer-depends on it).
          npm publish -w @rekog/mcp-nest --provenance --access public --tag "$NPM_TAG"
          npm publish -w @rekog/mcp-nest-auth --provenance --access public --tag "$NPM_TAG"

  smoke-test:
    name: Smoke test published package
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Resolve published version
        id: ver
        run: |
          TAG=${{ github.event.release.tag_name }}
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for npm propagation
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          for pkg in @rekog/mcp-nest @rekog/mcp-nest-auth; do
            ok=0
            for i in $(seq 1 30); do
              if npm view "$pkg@$V" version >/dev/null 2>&1; then
                echo "$pkg@$V is available on npm"
                ok=1
                break
              fi
              echo "Waiting for $pkg@$V to appear on npm (attempt $i/30)..."
              sleep 5
            done
            if [ "$ok" -ne 1 ]; then
              echo "Timed out waiting for $pkg@$V"
              exit 1
            fi
          done

      - name: Stage playground against published artifacts
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          cp -r playground /tmp/smoke
          cd /tmp/smoke
          # Point both workspace file: references at the published registry versions
          npm pkg set \
            "dependencies.@rekog/mcp-nest=$V" \
            "dependencies.@rekog/mcp-nest-auth=$V"
          npm install --no-audit --no-fund

      - name: Run smoke
        working-directory: /tmp/smoke
        run: npm run smoke
