appname = casdoor
httpport = 8000
runmode = dev
copyrequestbody = true

# --- Database: SQLite, single file, no extra container ---
# busy_timeout makes writers wait for a lock instead of erroring with
# SQLITE_BUSY (which can happen on concurrent writes, e.g. seeding + a DCR call
# at boot); WAL improves read/write concurrency. (modernc.org/sqlite pragma syntax.)
driverName = sqlite
dataSourceName = file:/data/casdoor.db?_pragma=busy_timeout(5000)&_pragma=journal_mode(WAL)
dbName = casdoor

tableNamePrefix =
showSql = false
redisEndpoint =
defaultStorageProvider =
isCloudIntranet = false
authState = "casdoor"
verificationCodeTimeout = 10
initScore = 0
logPostOnly = true
isUsernameLowered = false

# --- Public URLs ---
# Both must point at the host-published address so the OIDC discovery document
# advertises authorize/token/jwks on :8000 (otherwise Casdoor defaults the
# frontend to :7001, breaking the browser authorize step for MCP clients).
origin = "http://localhost:8000"
originFrontend = "http://localhost:8000"

staticBaseUrl = "https://cdn.casbin.org"
isDemoMode = false
batchSize = 100
enableGzip = true
ldapServerPort = 389
radiusServerPort = 1812
radiusSecret = "secret"
quota = {"organization": -1, "user": -1, "application": -1, "provider": -1}
logConfig = {"adapter":"file", "filename": "logs/casdoor.log", "maxdays":99999, "perm":"0770"}

# --- Declarative seed (org + app + users), re-applied on every boot ---
initDataFile = "./init_data.json"
initDataNewOnly = false
frontendBaseDir = "../cc_0"
