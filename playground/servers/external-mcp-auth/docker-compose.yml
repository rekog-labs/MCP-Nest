# Self-hosted Casdoor running as the OAuth 2.1 / OIDC Authorization Server.
#
# This is the AUTHORIZATION SERVER half of the playground. Unlike the
# supabase-mcp-auth example, Casdoor owns the WHOLE identity story:
#   - user login UI
#   - OAuth consent screen
#   - Dynamic Client Registration (RFC 7591)  -> POST /api/oauth/register
#   - RFC 8414 / OIDC discovery + a JWKS endpoint (RS256)
#
# The MCP server (main.ts, started separately with `npm run start:external-auth`)
# is ONLY a resource server: it validates Casdoor's RS256 access tokens against
# the published JWKS and runs tools. It contains no login/consent code.
#
# Everything here is dev-only: secrets are hard-coded so it boots with zero
# setup. Do NOT use these values anywhere real.
#
# Single container, SQLite, no separate database. State is re-seeded from
# casdoor/init_data.json on every boot (initDataNewOnly=false).
name: external-mcp-auth

services:
  casdoor:
    # `latest` at time of writing ships the DCR endpoint (/api/oauth/register)
    # and per-organization `dcrPolicy`. Pin to a digest/tag for reproducibility.
    image: casbin/casdoor:latest
    container_name: external-mcp-auth-casdoor
    restart: unless-stopped
    ports:
      # Host 8000 -> container 8000. Override with CASDOOR_HOST_PORT if taken
      # (and then also set CASDOOR_URL for the MCP server — see README).
      - "${CASDOOR_HOST_PORT:-8000}:8000"
    environment:
      RUNNING_IN_DOCKER: "true"
    volumes:
      - ./casdoor/conf/app.conf:/conf/app.conf:ro
      - ./casdoor/init_data.json:/init_data.json:ro
      # SQLite db + logs live here (bind mount so the container's uid 1000 can
      # write it; gitignored). Re-seeded from init_data.json on each boot.
      - ./casdoor/data:/data
